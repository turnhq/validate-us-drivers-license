# Run tests and publish to npm (or GitHub Packages).
# Runs on: new release, or manually from the Actions tab.
# For GitHub Packages: set registry-url to https://npm.pkg.github.com,
# use NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}, and scope the package name in package.json.

name: Node.js Package

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  test-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "10"
          registry-url: "https://registry.npmjs.org/"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
